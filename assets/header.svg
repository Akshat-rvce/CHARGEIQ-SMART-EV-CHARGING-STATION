<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="100%" height="100%">
  <defs>
    <linearGradient id="neonGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00F2FE" />
      <stop offset="100%" stop-color="#4FACFE" />
    </linearGradient>
    <linearGradient id="accentGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7700BB" />
      <stop offset="100%" stop-color="#FF007F" />
    </linearGradient>
    <filter id="glowEffect" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <style>
    @keyframes pulse {
      0% { opacity: 0.35; }
      50% { opacity: 0.95; }
      100% { opacity: 0.35; }
    }
    @keyframes rotateRing {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    .bg { fill: #070913; }
    .title { font-family: 'Orbitron', 'Rajdhani', sans-serif; font-weight: 900; font-size: 42px; fill: #00F2FE; filter: url(#glowEffect); }
    .subtitle { font-family: 'Rajdhani', sans-serif; font-weight: 500; font-size: 14px; fill: #A5B4FC; letter-spacing: 6px; }
    .lightning { fill: url(#neonGlow); filter: url(#glowEffect); animation: pulse 3s infinite ease-in-out; transform-origin: 100px 100px; }
    .ring { stroke: url(#neonGlow); stroke-width: 1.5; fill: none; transform-origin: 100px 100px; animation: rotateRing 20s infinite linear; stroke-dasharray: 8 6; }
    .ring-outer { stroke: url(#accentGlow); stroke-width: 1; fill: none; transform-origin: 100px 100px; animation: rotateRing 30s infinite linear reverse; stroke-dasharray: 12 10; opacity: 0.6; }
    .tech-text { font-family: 'Share Tech Mono', monospace; font-size: 11px; fill: #38BDF8; opacity: 0.8; }
    .grid-line { stroke: rgba(0, 242, 254, 0.04); stroke-width: 0.5; }
  </style>

  <!-- Background -->
  <rect width="800" height="200" rx="10" class="bg" />

  <!-- Sci-Fi Grid lines -->
  <g>
    <line x1="0" y1="40" x2="800" y2="40" class="grid-line" />
    <line x1="0" y1="80" x2="800" y2="80" class="grid-line" />
    <line x1="0" y1="120" x2="800" y2="120" class="grid-line" />
    <line x1="0" y1="160" x2="800" y2="160" class="grid-line" />
    <line x1="200" y1="0" x2="200" y2="200" class="grid-line" />
    <line x1="400" y1="0" x2="400" y2="200" class="grid-line" />
    <line x1="600" y1="0" x2="600" y2="200" class="grid-line" />
  </g>

  <!-- Animated Logo Left -->
  <g transform="translate(20, 0)">
    <circle cx="100" cy="100" r="60" class="ring-outer" />
    <circle cx="100" cy="100" r="50" class="ring" />
    <path class="lightning" d="M100,55 L75,105 L95,105 L88,145 L125,95 L105,95 Z" />
  </g>

  <!-- Main Text -->
  <text x="210" y="100" class="title">ChargeIQ AI</text>
  <text x="210" y="130" class="subtitle">SMART EV CHARGING SYSTEM</text>

  <!-- Futuristic corner metadata -->
  <text x="780" y="30" text-anchor="end" class="tech-text">SYS: ACTIVE</text>
  <text x="780" y="50" text-anchor="end" class="tech-text">STM32 + ESP32 SYSTEM</text>
  <text x="780" y="175" text-anchor="end" class="tech-text">RVCE SCADA CORE</text>
</svg>
